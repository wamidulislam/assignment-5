<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- title and favicon -->
    <title>Home Page</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- daisy ui and tailwind css -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- connect css stylesheet -->
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body class="bg-[#F8FAFC] w-full">
    <!-- Nav section -->
    <section class="shadow bg-white">
      <div class="navbar flex justify-between md:px-20">
        <!-- Left side -->
        <div class="flex justify-center items-center gap-2">
          <div>
            <img class="w-5" src="./assets/github-logo.png" alt="" />
          </div>
          <div>
            <p class="text-[10px] md:text-[18px] md:font-bold">
              GitHub Issues Tracker
            </p>
          </div>
        </div>
        <!-- right side search-->
        <div class="flex gap-3">
          <div class="search">
            <label class="input">
              <input id="input-search" type="text" required placeholder="Search" />
            </label>
          </div>
          <div>
            <button id="btn-search" class="btn btn-primary">Search</button>
          </div>
        </div>
      </div>
    </section>

    <!-- All Open Close Button section -->
    <section class="md:px-40  py-5 flex gap-3">
      <div>
        <button id="allBtn" onclick="colorBtn('all')" class="lg:w-[120px] h-40px btn btn-primary">All</button>
      </div>
      <div>
        <button id="openBtn" onclick="colorBtn('open')" class="lg:w-[120px] h-40px btn">
          Open
        </button>
      </div>
      <div>
        <button id="closeBtn" onclick="colorBtn('close')" class="lg:w-[120px] h-40px btn">
          Closed
        </button>
      </div>
    </section>

    <!-- Main section with text and all card -->
    <main class="sm:px-2 md:px-10 lg:px-40">
      <!-- text -->
      <div
        class="bg-white border border-amber-50 shadow-2xl rounded-xl flex justify-between items-center"
      >
        <!-- left -->
        <div class="flex items-center p-4 gap-3">
          <div>
            <img src="./assets/Aperture.png" alt="" />
          </div>
          <div>
            <p class="text-xl"><span id="cardCount"> 0 </span> Issues</p>
            <p class="text-[#64748B]">Track and manage your project issues</p>
          </div>
        </div>
        <!-- right -->
        <div class="flex gap-10 p-2">
          <div class="flex justify-center items-center gap-1">
            <span
              ><i class="fa-solid fa-circle" style="color: rgb(0, 169, 110)"></i
            ></span>
            <p>Open</p>
          </div>
          <div class="flex justify-center items-center gap-1">
            <span
              ><i
                class="fa-solid fa-circle"
                style="color: rgb(168, 85, 247)"
              ></i
            ></span>
            <p>Closed</p>
          </div>
        </div>
      </div>
      <!-- cards -->
      <div id="cards" class="grid grid-cols-1 justify-items-center md:grid-cols-3 gap-5 pt-5">
         <!-- button will dynamically added here -->
        </div>
        <!-- modal -->
         <div class="w-[636px]">
            <dialog id="card_details" class="modal">
              <div class="modal-box w-11/12 max-w-5xl">
                <h2 id="cardTitle" class="text-xl font-bold">Hello!</h2>
                <div class="flex gap-3 items-center">
                  <div>
                    <p id="cardStatus" class="bg-[#00A96E] rounded-xl text-white p-1 text-center">
                      Opened</p>
                  </div>
                  <div>
                    <p id="cardOpener" class="text-[#64748B]"><span>.</span>Opened by</p>
                  </div>
                  <div>
                    <p id="openDate" class="text-[#64748B]"><span>.</span>Date</p>
                  </div>
                </div>
                <div class="flex gap-4 mt-3">
                  <div class="bug">
                     <p
                 id="cardBug" class="bg-[#FEECEC] border border-[#FECACA] text-[#EF4444] text-center rounded-full">
                <i class="fa-solid fa-bug" style="color: rgb(239, 68, 68)"></i >
                  Bug
              </p>
                  </div>
                  <div class="help">
                    <p id="cardHelp" class="bg-[#FFF8DB] border border-[#FDE68A] text-[#D97706] text-center rounded-full">
                <i class="fa-solid fa-life-ring" style="color: rgb(217, 119, 6)"></i>
                      help
              </p>
                    </div>
                </div>
                <p id="description" class="mt-3 text-[#64748B]">description</p>
               <div class="mt-3 flex justify-between bg-base-200 rounded-md p-3">
                 <div>
                  <p>assignee</p>
                  <p id="person" class="mt-2">Name</p>
                </div>
                <div class="text-center">
                  <p >Priority</p>
                  <p id="cardPriority" class="bg-black text-white text-center rounded-full mt-2">High</p>
                </div>
               </div>
                <div class="modal-action">
                  <form method="dialog">
                    <!-- if there is a button, it will close the modal -->
                   <button class="btn" onclick="document.getElementById('card_details').close()">Close</button>
                  </form>
                </div>
              </div>
            </dialog>
         </div>

        <!-- loading spinner -->
         <div id="loadingSpin" class="justify-center hidden items-center">
          <span class="loading loading-spinner loading-xl"></span>
         </div>
    </main>

    <script src="./home.js"></script>
  </body>
</html>
